<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <style>
    .bg   { fill:#ffffff; }
    .card { fill:#f8fafc; stroke:#cbd5e1; }
    .gw   { fill:none;    stroke:#6366f1; stroke-width:2; }
    .l1   { fill:#eef2ff; stroke:#c7d2fe; }
    .l2   { fill:#ecfdf5; stroke:#a7f3d0; }
    .title { fill:#0f172a; font-weight:700; }
    .sub   { fill:#475569; }
    .label { fill:#334155; }
    .gwname{ fill:#4338ca; font-weight:700; letter-spacing:.5px; }
    .a-req { stroke:#6366f1; fill:none; stroke-width:2; }
    .a-res { stroke:#64748b; fill:none; stroke-width:2; }
    .h-req { fill:#6366f1; }
    .h-res { fill:#64748b; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill:#0b1220; }
      .card { fill:#111827; stroke:#334155; }
      .gw   { stroke:#818cf8; }
      .l1   { fill:#1e1b4b; stroke:#3730a3; }
      .l2   { fill:#052e2b; stroke:#134e4a; }
      .title { fill:#e2e8f0; }
      .sub   { fill:#94a3b8; }
      .label { fill:#cbd5e1; }
      .gwname{ fill:#a5b4fc; }
      .a-req { stroke:#818cf8; }
      .a-res { stroke:#94a3b8; }
      .h-req { fill:#818cf8; }
      .h-res { fill:#94a3b8; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="960" height="460" rx="14"/>

  <!-- 왼쪽: 모바일/핀테크 -->
  <rect class="card" x="24" y="110" width="150" height="112" rx="10"/>
  <text class="title" x="99" y="158" font-size="15" text-anchor="middle">모바일 · 핀테크</text>
  <text class="sub"   x="99" y="180" font-size="11.5" text-anchor="middle">REST / JSON</text>

  <!-- 오른쪽: 레거시 계정계 -->
  <rect class="card" x="786" y="256" width="150" height="112" rx="10"/>
  <text class="title" x="861" y="304" font-size="15" text-anchor="middle">레거시 계정계</text>
  <text class="sub"   x="861" y="326" font-size="11.5" text-anchor="middle">고정길이 전문 · TCP</text>

  <!-- 가운데: gwanmun -->
  <rect class="gw" x="300" y="70" width="360" height="320" rx="14"/>
  <text class="gwname" x="480" y="96" font-size="15" text-anchor="middle">gwanmun</text>

  <!-- 1층: API 게이트웨이 -->
  <rect class="l1" x="322" y="108" width="316" height="120" rx="9"/>
  <text class="title" x="480" y="150" font-size="14" text-anchor="middle">① API 게이트웨이 층</text>
  <text class="sub"   x="480" y="176" font-size="11.5" text-anchor="middle">JWT 인증 · 라우팅 · 레이트리밋 · 로깅</text>

  <!-- 2층: 연계(통역) -->
  <rect class="l2" x="322" y="250" width="316" height="120" rx="9"/>
  <text class="title" x="480" y="288" font-size="14" text-anchor="middle">② 연계(통역) 층</text>
  <text class="sub"   x="480" y="312" font-size="11.5" text-anchor="middle">JSON ↔ 전문 매핑 · TCP ↔ HTTP 변환</text>
  <text class="sub"   x="480" y="332" font-size="11.5" text-anchor="middle">거래코드 라우팅 · 어댑터</text>

  <!-- 왼쪽 화살표: 모바일 ↔ ① -->
  <path class="a-req" d="M176 148 L292 148"/>
  <polygon class="h-req" points="292,148 282,143 282,153"/>
  <text class="label" x="234" y="138" font-size="11" text-anchor="middle">REST · JSON  ·  "잔액 조회"</text>

  <path class="a-res" d="M292 190 L176 190"/>
  <polygon class="h-res" points="176,190 186,185 186,195"/>
  <text class="label" x="234" y="208" font-size="11" text-anchor="middle">JSON 응답</text>

  <!-- 오른쪽 화살표: ② ↔ 계정계 -->
  <path class="a-req" d="M668 290 L784 290"/>
  <polygon class="h-req" points="784,290 774,285 774,295"/>
  <text class="label" x="726" y="280" font-size="11" text-anchor="middle">고정길이 전문 · TCP</text>

  <path class="a-res" d="M784 332 L668 332"/>
  <polygon class="h-res" points="668,332 678,327 678,337"/>
  <text class="label" x="726" y="350" font-size="11" text-anchor="middle">전문 응답</text>
</svg>
