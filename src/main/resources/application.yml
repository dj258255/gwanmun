server:
  # 기본 8080은 다른 프로세스가 점유할 수 있어 8090으로 고정한다.
  port: 8090
  # Phase 5: 종료 신호를 받으면 처리 중인 요청을 마저 끝내고 닫는다(원장 적재·풀 정리와 한 세트).
  shutdown: graceful

spring:
  application:
    name: gwanmun
  lifecycle:
    # graceful shutdown이 처리 중 요청을 기다려 주는 상한.
    timeout-per-shutdown-phase: 10s
  # Phase 5 거래 원장 저장소. 기본은 H2 인메모리(로컬 개발·테스트가 DB 없이 돌게),
  # 운영 데모는 postgres 프로파일(docker compose up 후 --spring.profiles.active=postgres).
  datasource:
    url: jdbc:h2:mem:gwanmun;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    # 뷰 렌더링까지 영속 컨텍스트를 끌고 갈 이유가 없다(REST 전용).
    open-in-view: false

# Phase 5 관측 — 헬스(liveness/readiness 분리)와 Prometheus 스크레이프 지점.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # /actuator/health/liveness · /actuator/health/readiness 를 분리 노출한다.
      probes:
        enabled: true
      show-details: always

# 목업 계정계(코어뱅킹) TCP 연동 설정.
gwanmun:
  core:
    host: 127.0.0.1
    port: 9099
    # 거래내역 조회(가변 전문, 길이 프리픽스 프레이밍) 목업 계정계 포트.
    history:
      port: 9098
    # Phase 9 — 당일 처리내역 조회(EOD 대사) 포트. 잔액조회 계정계(9099)와 같은 인메모리 원장을
    # 공유하는 한 프로세스가 이 포트도 함께 연다(가변 전문, 길이 프리픽스).
    settlement:
      port: 9097
      # 하루치 전량이라 조회성 read 타임아웃보다 넉넉히.
      read-timeout-ms: 10000
    # true면 앱과 함께 목업 계정계를 내장 기동(개발 편의).
    # false면 계정계를 독립 프로세스로 따로 띄운 "앱↔계정계 두 프로세스" 구성.
    embedded: true
    # 내장 목업의 지연 모드 계좌(9999...) 응답 지연(ms). 테스트가 짧은 지연으로 조절한다(Phase 7).
    mock:
      delay-ms: 5000
    connect-timeout-ms: 2000
    read-timeout-ms: 3000
    # Phase 4 커넥션 풀 — 요청당 소켓을 새로 열던 것을 재사용으로 바꾼다.
    pool:
      # 최대 크기(백엔드 소켓 수 상한). 데모에서 고갈을 눈으로 보게 낮게 잡았다.
      max-size: 4
      # 가득 찼을 때 반납을 기다리는 시간. 초과하면 무한 대기 대신 거절(빠른 실패).
      borrow-timeout-ms: 2000
      # Phase 7: 유휴 TTL — 반납 후 이 시간이 지난 유휴 연결은 재사용하지 않고 폐기한다.
      # isValid()는 로컬 소켓 플래그만 봐서, 계정계가 재기동하며 닫은 소켓도 멀쩡해 보인다
      # (write는 OS 버퍼로 "성공"한 뒤 read에서야 EOF). 낡은 소켓에 변경성 전문을 태우면
      # 억울한 UNKNOWN이 된다 — 수명으로 걸러 낸다.
      idle-ttl-ms: 30000
    # Phase 6 장애 내성 — 거래 단위 데드라인 · 조회성 한정 재시도 · 서킷브레이커.
    resilience:
      # 소켓 read 타임아웃(위 read-timeout-ms, 1회 호출 제한)과 별개인 "거래 전체" 데드라인.
      # 재시도·백오프를 포함한 상한이며, 마지막 시도의 read 타임아웃도 남은 시간으로 깎인다.
      transaction-deadline-ms: 5000
      # 조회성(잔액조회·거래내역·상태조회) 거래만 재시도한다. 변경성(망취소 등)은 코드가 0회로
      # 강제한다 — 응답을 못 받은 변경성 거래의 재전송은 이중 거래다.
      retry-max: 2
      # 첫 재시도 백오프. 이후 지수 증가(200 → 400 → ...).
      retry-backoff-ms: 200
      circuit:
        # 연속 실패가 이 수에 닿으면 OPEN(이후 호출은 계정계에 안 가고 즉시 실패).
        # 데모에서 서킷이 열리는 것을 몇 번의 호출로 보게 낮게 잡았다.
        failure-threshold: 3
        # OPEN 후 이 시간이 지나면 HALF_OPEN — 제한된 탐침으로 회복을 살핀다.
        open-wait-ms: 10000
        # HALF_OPEN에서 동시에 내보내는 탐침 수(초과분은 즉시 거절).
        half-open-max-probes: 1
  # Phase 3 관문(API 게이트웨이) 설정 — 인증·유량제어.
  gateway:
    # API 키 → 클라이언트 id. 등록된 키만 통과(잘못된 키 403, 키 없음 401).
    api-keys:
      demo-key-fintech-a: fintech-a
      demo-key-fintech-b: fintech-b
    # 클라이언트별 토큰버킷: 순간 5건까지 허용, 분당 30개 속도로 보충(초당 0.5개).
    # 데모에서 5건 연속 성공 후 429가 뜨는 것을 눈으로 보게 낮게 잡았다.
    rate-capacity: 5
    rate-refill-per-minute: 30
  # Phase 9 — 멱등키(Idempotency-Key). 호출자 재전송을 게이트웨이가 구분·차단.
  idempotency:
    # 키 보존 기간(초). 관례는 24시간(토스). 지난 키는 없는 것으로 보고 새로 처리한다.
    ttl-seconds: 86400
    # 만료 키 청소 스케줄(기본 비활성). 예: "0 30 * * * *"(매시 30분).
    purge-cron: "-"
  # Phase 9 — EOD 대사 배치. 마감 시각 자동 실행(기본 비활성). 예: "0 5 0 * * *"(매일 00:05).
  reconciliation:
    cron: "-"

logging:
  level:
    io.gwanmun: INFO
  pattern:
    # Phase 5: 모든 로그 라인에 correlation ID를 자동으로 찍는다(CorrelationIdFilter가 MDC에 넣는다).
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %5p --- [%15.15t] [cid:%X{correlationId:-}] %-40.40logger{39} : %m%n"

---
# 운영 데모 프로파일 — 거래 원장을 PostgreSQL 컨테이너(docker-compose.yml, 호스트 포트 25432)에 적재.
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://127.0.0.1:25432/gwanmun
    username: gwanmun
    password: gwanmun
    driver-class-name: org.postgresql.Driver

---
# 부하 실측 프로파일 (Phase 8) — `--spring.profiles.active=loadtest`.
# 목표는 "N TPS 달성"이 아니라 한계 TPS·P95·병목 지점을 드러내는 것이라, 데모용으로 일부러 낮춰
# 두었던 값(풀 4·rate 5)을 실측에 방해되지 않게 올린다. 이 값을 문서에 명시해 재현 가능하게 한다.
spring:
  config:
    activate:
      on-profile: loadtest
gwanmun:
  core:
    # 지연 계좌(9999...)만 영향받는 값이지만 실측 프로파일임을 분명히 하려고 0으로 둔다.
    mock:
      delay-ms: 0
    # 연결 실패를 빨리 감지하려고 짧게(서킷 OPEN 시나리오에서 죽은 포트로 붙일 때 빠른 실패).
    connect-timeout-ms: 300
    read-timeout-ms: 1000
    pool:
      # 풀이 인위적 병목이 되지 않게 올린다 — 한계가 풀인지 다른 것인지 가리려는 목적.
      max-size: 100
      borrow-timeout-ms: 1000
      idle-ttl-ms: 30000
    resilience:
      transaction-deadline-ms: 2000
      # 부하 중 재시도가 처리량을 왜곡하지 않게 조회성 재시도도 끈다(순수 1회 왕복 처리량 측정).
      retry-max: 0
      circuit:
        failure-threshold: 3
        open-wait-ms: 10000
        half-open-max-probes: 1
  gateway:
    # 유량제어가 부하를 막지 않게 크게 — rate limit은 Phase 3에서 이미 검증했고, 여기선 방해 요소다.
    rate-capacity: 2000000
    rate-refill-per-minute: 600000000
